<!DOCTYPE html>
<html>
<head>
    <title>ROBLO-TYCOON: IDK12 EDITION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: 'Arial Black', sans-serif; height: 100vh; width: 100vw; }
        
        /* UI WRAPPER */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5000; display: none; }
        .money-tag { position: absolute; top: 45px; left: 15px; background: #2ecc71; padding: 10px 20px; border-radius: 50px; color: white; font-size: 20px; border: 3px solid #fff; pointer-events: auto; box-shadow: 0 4px 0 #27ae60; }
        
        #top-right-ui { position: absolute; top: 45px; right: 15px; display: flex; flex-direction: column; gap: 8px; }
        .small-btn { background: rgba(0,0,0,0.8); color: white; border: 2px solid white; padding: 8px 12px; border-radius: 8px; font-size: 11px; pointer-events: auto; text-align: center; }

        /* SCROLLABLE CHAT SYSTEM */
        #public-chat { 
            position: absolute; 
            bottom: 170px; 
            left: 15px; 
            width: 280px; 
            background: rgba(0,0,0,0.75); /* Darker for better visibility */
            border-radius: 10px; 
            padding: 10px; 
            pointer-events: auto; /* IMPORTANT: Allows scrolling */
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #chat-msgs { 
            height: 140px; 
            overflow-y: auto; /* Enable scrolling */
            display: flex; 
            flex-direction: column; /* Normal direction for scrolling history */
            color: white; 
            font-size: 14px; 
            margin-bottom: 8px;
            font-family: 'Segoe UI', sans-serif;
            scrollbar-width: thin; /* For Firefox */
        }
        /* Custom scrollbar for Chrome/Safari */
        #chat-msgs::-webkit-scrollbar { width: 5px; }
        #chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .chat-line { margin-bottom: 6px; word-wrap: break-word; line-height: 1.2; }

        #chat-input { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.5); 
            color: white; 
            padding: 10px; 
            width: 90%; 
            border-radius: 5px;
            outline: none;
        }

        /* FIXED JOYSTICK & JUMP */
        #joy-ui { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; pointer-events: auto; touch-action: none; }
        #joy-stick { position: absolute; width: 45px; height: 45px; background: white; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #jump-btn { position: absolute; bottom: 50px; right: 40px; width: 90px; height: 90px; background: rgba(255,255,255,0.2); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; }

        #setup-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        #setup-screen input { padding: 15px; border-radius: 30px; border: 2px solid #fff; font-size: 18px; margin: 20px; text-align: center; }
        
        .world-label { position: absolute; transform: translate(-50%, -100%); background: rgba(0,0,0,0.8); color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; pointer-events: none; border: 1px solid white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1>TYCOON ONLINE</h1>
    <input type="text" id="username-input" placeholder="Enter Name" maxlength="12">
    <button class="small-btn" style="padding:15px 40px; font-size:18px; background:#3498db;" onclick="saveNameAndStart()">PLAY</button>
</div>

<div id="ui-layer">
    <div class="money-tag">$<span id="cash">0</span></div>
    <div id="top-right-ui">
        <div class="small-btn" onclick="openRename()">RENAME</div>
    </div>
    
    <div id="public-chat">
        <div id="chat-msgs"></div>
        <input type="text" id="chat-input" placeholder="Type message...">
    </div>

    <div id="joy-ui"><div id="joy-stick"></div></div>
    <div id="jump-btn">JUMP</div>
</div>

<div id="labels"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let cash = 0, vY = 0, playerName = "", dropperLevel = 0;
    const parts = [], droppers = [], pads = [];
    let pubnub;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x74b9ff);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.7), new THREE.MeshStandardMaterial({color: 0x0055ff})));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffff00}));
    head.position.y = 1.1; player.add(head); scene.add(player);
    scene.add(new THREE.GridHelper(60, 30), new THREE.AmbientLight(0xffffff, 0.9));

    window.saveNameAndStart = () => {
        playerName = document.getElementById('username-input').value.trim() || "Guest";
        localStorage.setItem("SavedPlayerName", playerName);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        if(!pubnub) connectNetwork();
        rebuildTycoon();
        addChatMessage("SYSTEM", "Welcome! You can now scroll the chat.");
    };

    window.openRename = () => { document.getElementById('setup-screen').style.display = 'flex'; };

    function connectNetwork() {
        try {
            pubnub = new PubNub({
                publishKey: 'pub-c-4e803e5c-197e-405a-8b89-a590c7499f57',
                subscribeKey: 'sub-c-5e589710-8597-4223-b1d5-94f31c828230',
                userId: "u" + Math.random().toString(36).substring(7)
            });
            pubnub.subscribe({ channels: ['ty_chat'] });
            pubnub.addListener({ message: (m) => addChatMessage(m.message.user, m.message.text) });
        } catch(e) {}
    }

    function addChatMessage(user, txt) {
        const chatBox = document.getElementById('chat-msgs');
        const d = document.createElement('div');
        d.className = 'chat-line';
        const color = (user === "SYSTEM") ? "#2ecc71" : (user === playerName ? "#f1c40f" : "#3498db");
        d.innerHTML = `<b style="color:${color}">${user}:</b> ${txt}`;
        chatBox.appendChild(d);
        
        // Auto-scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function rebuildTycoon() {
        pads.forEach(p => { if(p.mesh.parent) scene.remove(p.mesh); if(p.div) p.div.remove(); });
        pads.length = 0;
        if (dropperLevel >= 1) spawnDropper(0);
        if (dropperLevel >= 2) spawnDropper(1);
        if (dropperLevel >= 3) spawnDropper(2);
        if(dropperLevel == 0) createBuyPad(0, 5, 0, "FREE DROPPER");
        if(dropperLevel == 1) createBuyPad(-8, 5, 500, "DROPPER 2");
        if(dropperLevel == 2) createBuyPad(-16, 5, 2500, "DROPPER 3");
    }

    function createBuyPad(x, z, cost, name) {
        const pad = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.2, 32), new THREE.MeshStandardMaterial({color: 0x2ecc71}));
        pad.position.set(x, 0.1, z); scene.add(pad);
        const div = document.createElement('div'); div.className = 'world-label';
        div.innerHTML = `<b>${name}</b><br>$${cost}`;
        document.getElementById('labels').appendChild(div);
        pads.push({ mesh: pad, cost: cost, div: div, active: true });
    }

    function spawnDropper(idx) {
        const d = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), new THREE.MeshStandardMaterial({color: 0xbdc3c7}));
        d.position.set(12, 6, -8 + (idx * 5));
        scene.add(d); droppers.push({ mesh: d, lastDrop: 0 });
    }

    // JOYSTICK
    let joyActive = false, moveDir = {x:0, z:0};
    const joyUi = document.getElementById('joy-ui');
    const joyStick = document.getElementById('joy-stick');

    joyUi.addEventListener('touchstart', (e) => { joyActive = true; updateJoy(e.touches[0]); }, {passive: false});
    window.addEventListener('touchmove', (e) => { if(!joyActive) return; updateJoy(e.touches[0]); }, {passive: false});
    window.addEventListener('touchend', () => { joyActive = false; moveDir = {x:0, z:0}; joyStick.style.left='50%'; joyStick.style.top='50%'; });

    function updateJoy(touch) {
        const rect = joyUi.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        let dx = touch.clientX - cx, dy = touch.clientY - cy;
        const dist = Math.sqrt(dx*dx + dy*dy), max = 40;
        if (dist > max) { dx *= max / dist; dy *= max / dist; }
        joyStick.style.left = `calc(50% + ${dx}px)`;
        joyStick.style.top = `calc(50% + ${dy}px)`;
        moveDir.x = dx / max; moveDir.z = dy / max;
    }

    document.getElementById('jump-btn').addEventListener('touchstart', () => { if(player.position.y <= 1.21) vY = 0.3; });

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && e.target.value.trim() !== "") {
            pubnub.publish({ channel: 'ty_chat', message: { user: playerName, text: e.target.value } });
            e.target.value = ""; e.target.blur();
        }
    });

    function loop(t) {
        requestAnimationFrame(loop);
        if(joyActive) { 
            player.position.x += moveDir.x * 0.22; player.position.z += moveDir.z * 0.22;
            player.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
        }
        player.position.y += vY;
        if(player.position.y > 1.2) vY -= 0.018; else { player.position.y = 1.2; vY = 0; }

        pads.forEach(p => {
            if(!p.active) return;
            const v = p.mesh.position.clone().project(camera);
            p.div.style.left = (v.x * .5 + .5) * window.innerWidth + 'px';
            p.div.style.top = (v.y * -.5 + .5) * window.innerHeight + 'px';
            if(player.position.distanceTo(p.mesh.position) < 2.2 && cash >= p.cost) {
                cash -= p.cost; p.active = false; dropperLevel++;
                rebuildTycoon(); document.getElementById('cash').innerText = cash;
            }
        });

        droppers.forEach(d => {
            if(t - d.lastDrop > 2500) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffd700}));
                p.position.set(d.mesh.position.x, d.mesh.position.y - 1, d.mesh.position.z);
                scene.add(p); parts.push(p); d.lastDrop = t;
            }
        });

        for(let i=parts.length-1; i>=0; i--) {
            const p = parts[i];
            if(p.position.y > 0.8) p.position.y -= 0.15; else p.position.z += 0.15;
            if(p.position.z > 9.5) { scene.remove(p); parts.splice(i,1); cash += 25; document.getElementById('cash').innerText = cash; }
        }
        camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y+12, player.position.z+18), 0.1);
        camera.lookAt(player.position); renderer.render(scene, camera);
    }
    loop(0);
</script>
</body>
</html>
