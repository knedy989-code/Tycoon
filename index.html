<!DOCTYPE html>
<html>
<head>
    <title>ROBLO-TYCOON: IDK12 EDITION</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #87CEEB; 
            touch-action: none; 
            font-family: 'Arial Black', sans-serif;
            height: 100vh;
            width: 100vw;
        }
        
        /* GUI Layout */
        #gui { position: absolute; top: 40px; left: 15px; pointer-events: none; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .money-tag { background: #2ecc71; padding: 10px 20px; border-radius: 50px; color: white; font-size: 20px; border: 3px solid #fff; pointer-events: auto; box-shadow: 0 4px 0 #27ae60; }
        
        /* Top Right Controls */
        #top-right-ui { position: absolute; top: 40px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .small-btn { background: rgba(0,0,0,0.7); color: white; border: 2px solid white; padding: 8px 12px; border-radius: 8px; font-size: 11px; pointer-events: auto; text-align: center; font-weight: bold; }

        /* Chat System */
        #chat-box { position: absolute; bottom: 120px; left: 15px; width: 220px; height: 140px; background: rgba(0,0,0,0.5); border-radius: 8px; color: white; font-size: 11px; padding: 8px; pointer-events: auto; border: 1px solid rgba(255,255,255,0.2); }
        #chat-msgs { height: 95px; overflow-y: auto; display: flex; flex-direction: column-reverse; margin-bottom: 5px; }
        #chat-input { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px; width: 90%; border-radius: 4px; outline: none; }

        /* Setup Screen */
        #setup-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        #setup-screen input { padding: 15px; border-radius: 30px; border: none; font-size: 18px; margin: 20px; width: 220px; text-align: center; outline: none; }

        /* Mobile Controls */
        #jump-btn { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.3); border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; }
        #joy-area { position: absolute; bottom: 0; left: 0; width: 50%; height: 60%; }
        #joy-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; display: none; transform: translate(-50%, -50%); }
        #joy-knob { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
        
        .world-label { position: absolute; transform: translate(-50%, -100%); background: rgba(0,0,0,0.8); color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; border: 1px solid #fff; pointer-events: none; white-space: nowrap; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div style="width:50px; height:50px; background:#ffff00; border-radius:10px; margin-bottom:10px;"></div>
    <h1>TYCOON ONLINE</h1>
    <p style="color: #aaa;">Admin recognized: idk12</p>
    <input type="text" id="username-input" placeholder="Player Name" maxlength="12">
    <button class="money-tag" onclick="createProfile()">PLAY NOW</button>
</div>

<div id="gui">
    <div class="money-tag">$<span id="cash">0</span></div>
</div>

<div id="top-right-ui">
    <div class="small-btn" onclick="toggleMulti()">MULTI: <span id="m-status" style="color:#2ecc71">ON</span></div>
    <div class="small-btn" style="background:#e74c3c;" onclick="resetMyData()">RESET DATA</div>
</div>

<div id="chat-box">
    <div id="chat-msgs"></div>
    <input type="text" id="chat-input" placeholder="Chat or /gold...">
</div>

<div id="labels"></div>
<div id="jump-btn">JUMP</div>
<div id="joy-area"><div id="joy-base"><div id="joy-knob"></div></div></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    // --- OWNER & SAVE CONFIG ---
    const CREATOR_NAME = "idk12"; 
    const SAVE_KEY = "TycoonSave_v2_idk12";
    
    const myID = "u_" + Math.random().toString(16).slice(2, 8);
    const pubnub = new PubNub({
        publishKey: 'pub-c-4e803e5c-197e-405a-8b89-a590c7499f57',
        subscribeKey: 'sub-c-5e589710-8597-4223-b1d5-94f31c828230',
        userId: myID
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x74b9ff);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    let cash = 0, vY = 0, playerName = "", isAdmin = false, dropperLevel = 0, multiOn = true;
    const parts = [], droppers = [], pads = [];

    // --- PLAYER MODEL ---
    const player = new THREE.Group();
    player.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.7), new THREE.MeshStandardMaterial({color: 0x0055ff})));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffff00}));
    head.position.y = 1.1; player.add(head); scene.add(player);

    // --- SAVING LOGIC ---
    function saveGame() {
        if (!playerName) return;
        const data = { cash, dropperLevel, playerName };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }

    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if(saved) {
            const data = JSON.parse(saved);
            cash = data.cash; dropperLevel = data.dropperLevel; playerName = data.playerName;
            if(playerName === CREATOR_NAME) isAdmin = true;
            document.getElementById('setup-screen').style.display = 'none';
            rebuildTycoon(); updateUI();
            addLog("Welcome back, " + playerName + "!", "#2ecc71");
            return true;
        }
        return false;
    }

    window.resetMyData = () => {
        if(confirm("Wipe all progress? You will lose all cash and machines!")) {
            localStorage.removeItem(SAVE_KEY);
            location.reload();
        }
    };

    // --- TYCOON REBUILD ---
    function rebuildTycoon() {
        pads.forEach(p => { scene.remove(p.mesh); p.div.remove(); });
        pads.length = 0;
        
        if (dropperLevel >= 1) spawnDropper(0);
        if (dropperLevel >= 2) spawnDropper(1);
        if (dropperLevel >= 3) spawnDropper(2);
        
        if(dropperLevel == 0) createBuyPad(0, 5, 0, "FREE DROPPER");
        if(dropperLevel == 1) createBuyPad(-8, 5, 500, "DROPPER 2");
        if(dropperLevel == 2) createBuyPad(-16, 5, 2500, "DROPPER 3");
    }

    function createBuyPad(x, z, cost, name) {
        const pad = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.2, 32), new THREE.MeshStandardMaterial({color: 0x2ecc71, emissive: 0x2ecc71, emissiveIntensity: 0.2}));
        pad.position.set(x, 0.1, z); scene.add(pad);
        const div = document.createElement('div'); div.className = 'world-label';
        div.innerHTML = `<b>${name}</b><br>$${cost}`;
        document.getElementById('labels').appendChild(div);
        pads.push({ mesh: pad, cost: cost, div: div, active: true });
    }

    function spawnDropper(idx) {
        const d = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), new THREE.MeshStandardMaterial({color: 0xbdc3c7}));
        d.position.set(12, 6, -8 + (idx * 5));
        scene.add(d); droppers.push({ mesh: d, lastDrop: 0 });
    }

    // --- ADMIN & CHAT ---
    const chatInput = document.getElementById('chat-input');
    chatInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && chatInput.value.trim() !== "") {
            let val = chatInput.value;
            if (val.startsWith("/gold") && isAdmin) {
                let amt = parseInt(val.split(" ")[1]) || 10000;
                cash += amt; updateUI(); saveGame();
                addLog("Admin Added $" + amt, "#f1c40f");
            } else if (val === "/wipe" && isAdmin) {
                if(confirm("NUCLEAR OPTION: Reset EVERYONE?")) {
                    pubnub.publish({ channel: 'ty_admin', message: { type: "WIPE", sender: playerName } });
                }
            } else {
                pubnub.publish({ channel: 'ty_chat', message: { user: playerName, text: val } });
            }
            chatInput.value = ""; chatInput.blur();
        }
    });

    pubnub.subscribe({ channels: ['ty_chat', 'ty_admin'] });
    pubnub.addListener({ 
        message: (m) => {
            if (m.channel === 'ty_chat') addLog(m.message.user + ": " + m.message.text);
            if (m.channel === 'ty_admin' && m.message.type === "WIPE" && !isAdmin) {
                cash = 0; dropperLevel = 0; saveGame(); rebuildTycoon(); updateUI();
                addLog("SERVER WIPE BY " + m.message.sender, "#e74c3c");
            }
        }
    });

    window.toggleMulti = () => {
        multiOn = !multiOn;
        document.getElementById('m-status').innerText = multiOn ? "ON" : "OFF";
        document.getElementById('m-status').style.color = multiOn ? "#2ecc71" : "#ff3333";
    };

    window.createProfile = () => {
        playerName = document.getElementById('username-input').value.trim();
        if(playerName.length > 2) {
            if(playerName === CREATOR_NAME) isAdmin = true;
            document.getElementById('setup-screen').style.display = 'none';
            rebuildTycoon(); updateUI(); saveGame();
        }
    };

    function updateUI() { document.getElementById('cash').innerText = cash; }
    function addLog(txt, col="#fff") {
        const d = document.createElement('div'); d.style.color = col; d.innerText = txt;
        document.getElementById('chat-msgs').prepend(d);
    }

    // --- ENGINE ---
    scene.add(new THREE.GridHelper(60, 30), new THREE.AmbientLight(0xffffff, 0.7));
    let joyActive = false, moveDir = {x:0, z:0};

    function loop(t) {
        requestAnimationFrame(loop);
        if(joyActive) { 
            player.position.x += moveDir.x * 0.2; player.position.z += moveDir.z * 0.2;
            player.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
        }
        player.position.y += vY;
        if(player.position.y > 1.2) vY -= 0.018; else { player.position.y = 1.2; vY = 0; }

        pads.forEach(p => {
            if(!p.active) return;
            const v = p.mesh.position.clone(); v.y += 2.5; v.project(camera);
            p.div.style.left = (v.x * .5 + .5) * window.innerWidth + 'px';
            p.div.style.top = (v.y * -.5 + .5) * window.innerHeight + 'px';
            if(player.position.distanceTo(p.mesh.position) < 2.2 && cash >= p.cost) {
                cash -= p.cost; p.active = false; dropperLevel++;
                rebuildTycoon(); updateUI(); saveGame();
            }
        });

        droppers.forEach(d => {
            if(t - d.lastDrop > 2500) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: 0xffd700}));
                p.position.set(d.mesh.position.x, d.mesh.position.y - 1, d.mesh.position.z);
                scene.add(p); parts.push(p); d.lastDrop = t;
            }
        });

        for(let i=parts.length-1; i>=0; i--) {
            const p = parts[i];
            if(p.position.y > 0.8) p.position.y -= 0.15; else p.position.z += 0.15;
            if(p.position.z > 9.5) { scene.remove(p); parts.splice(i,1); cash += 25; updateUI(); }
        }

        camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y+12, player.position.z+18), 0.1);
        camera.lookAt(player.position); renderer.render(scene, camera);
    }

    // Inputs
    document.getElementById('joy-area').addEventListener('touchstart', e => {
        joyActive = true; const b = document.getElementById('joy-base'); b.style.display = 'block';
        b.style.left = e.touches[0].clientX + 'px'; b.style.top = e.touches[0].clientY + 'px';
    });
    document.getElementById('joy-area').addEventListener('touchmove', e => {
        if(!joyActive) return;
        const b = document.getElementById('joy-base'), dx = e.touches[0].clientX - parseInt(b.style.left), dy = e.touches[0].clientY - parseInt(b.style.top);
        const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40), ang = Math.atan2(dy, dx);
        document.getElementById('joy-knob').style.left = (50+Math.cos(ang)*dist)+'px';
        document.getElementById('joy-knob').style.top = (50+Math.sin(ang)*dist)+'px';
        moveDir.x = (Math.cos(ang)*dist)/40; moveDir.z = (Math.sin(ang)*dist)/40;
    });
    document.getElementById('joy-area').addEventListener('touchend', () => { joyActive = false; document.getElementById('joy-base').style.display='none'; });
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(player.position.y <= 1.21) vY = 0.3; });

    window.onload = loadGame;
    loop(0);
</script>
</body>
</html>
